<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Clay Court</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f5f2ee;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }
  svg {
    display: block;
    width: 100vw;
    height: 100vh;
  }
</style>
</head>
<body>
<svg id="court" viewBox="0 0 1000 500" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">

  <rect width="1000" height="500" fill="#f5f2ee"/>

  <!-- Campo: linee di fondo a x=180 e x=820, rettangolo esteso ~130px oltre -->
  <rect x="50" y="360" width="900" height="55" rx="2" fill="#c1622e"/>
  <line x1="180" y1="355" x2="180" y2="420" stroke="rgba(255,255,255,0.75)" stroke-width="2.5"/>
  <line x1="820" y1="355" x2="820" y2="420" stroke="rgba(255,255,255,0.75)" stroke-width="2.5"/>
  <line x1="180" y1="415" x2="820" y2="415" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <line x1="340" y1="360" x2="340" y2="415" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <line x1="660" y1="360" x2="660" y2="415" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>

  <!-- Rete -->
  <line x1="500" y1="322" x2="500" y2="362" stroke="#cccccc" stroke-width="3"/>
  <rect x="491" y="318" width="18" height="7" rx="2" fill="#dddddd"/>
  <line x1="491" y1="327" x2="509" y2="327" stroke="#bbb" stroke-width="1"/>
  <line x1="491" y1="334" x2="509" y2="334" stroke="#bbb" stroke-width="1"/>
  <line x1="491" y1="341" x2="509" y2="341" stroke="#bbb" stroke-width="1"/>
  <line x1="491" y1="348" x2="509" y2="348" stroke="#bbb" stroke-width="1"/>
  <line x1="491" y1="355" x2="509" y2="355" stroke="#bbb" stroke-width="1"/>

  <ellipse id="shadow" cx="130" cy="362" rx="10" ry="3.5" fill="rgba(0,0,0,0.2)"/>
  <circle id="ball" cx="130" cy="360" r="10" fill="#c8e04a" stroke="#9aad28" stroke-width="1.5"/>

</svg>

<script>
const GROUND = 360;
const BALL_R = 10;

function cb(p0, p1, p2, p3, t) {
  const m = 1 - t;
  return m*m*m*p0 + 3*m*m*t*p1 + 3*m*t*t*p2 + t*t*t*p3;
}

/*
  Traiettoria corretta:

  Seg 1: A colpisce da terra (dietro linea di fondo sx, x=130, y=GROUND)
         → vola con arco alto → atterra vicino linea di fondo dx (x=780, y=GROUND)
         Nessun rimbalzo intermedio. La palla supera la rete in volo.

  Seg 2: Rimbalzo a destra → sale alto
         → si ferma a metà altezza (x≈870, y=metà tra GROUND e picco rimbalzo)
*/

const AX = 130;       // A: fuori campo sx, a terra
const BNC_R = 780;    // punto di atterraggio destra (vicino linea fondo dx)
const PEAK_Y = 55;    // picco del volo principale
const BOUNCE_PEAK = 150; // picco del rimbalzo post-atterraggio
const STOP_Y = (GROUND + BOUNCE_PEAK) / 2; // metà altezza rimbalzo ≈ 255
const STOP_X = 880;   // posizione finale (dove B colpirebbe)

const CYCLE_MS = 4700;

const sequence = [
  // Seg 1: volo diretto A → atterraggio fondo dx (arco alto, supera rete)
  {
    x0: AX,    y0: GROUND,
    cx1: 200,  cy1: PEAK_Y,   // sale subito alto verso sinistra
    cx2: 680,  cy2: PEAK_Y,   // rimane alto, poi scende verso destra
    x1: BNC_R, y1: GROUND,
    dur: 0.38
  },
  // Seg 2: rimbalzo → sale fino a metà altezza (stop)
  {
    x0: BNC_R,  y0: GROUND,
    cx1: BNC_R, cy1: BOUNCE_PEAK,
    cx2: STOP_X - 15, cy2: STOP_Y + 20,
    x1: STOP_X, y1: STOP_Y,
    dur: 0.14
  },
  // Pausa lunga: palla ferma a destra a metà altezza
  {
    x0: STOP_X, y0: STOP_Y,
    cx1: STOP_X, cy1: STOP_Y,
    cx2: STOP_X, cy2: STOP_Y,
    x1: STOP_X,  y1: STOP_Y,
    dur: 0.48
  },
];

const totalDur = sequence.reduce((s, sg) => s + sg.dur, 0);
sequence.forEach(sg => sg.dur /= totalDur);

const ball   = document.getElementById('ball');
const shadow = document.getElementById('shadow');
let startTime = null;

function frame(ts) {
  if (!startTime) startTime = ts;
  const elapsed  = (ts - startTime) % CYCLE_MS;
  const progress = elapsed / CYCLE_MS;

  let cum = 0;
  let active = sequence[sequence.length - 1];
  let tSeg = 1;
  for (const sg of sequence) {
    if (progress < cum + sg.dur) {
      tSeg = (progress - cum) / sg.dur;
      active = sg;
      break;
    }
    cum += sg.dur;
  }

  const bx = cb(active.x0, active.cx1, active.cx2, active.x1, tSeg);
  const by = cb(active.y0, active.cy1, active.cy2, active.y1, tSeg);

  ball.setAttribute('cx', bx);
  ball.setAttribute('cy', by);

  const height = Math.max(0, GROUND - by);
  const maxH   = GROUND - 20;
  const scale  = Math.max(0.08, 1 - (height / maxH) * 0.92);
  shadow.setAttribute('cx', bx);
  shadow.setAttribute('rx', BALL_R * scale);
  shadow.setAttribute('opacity', Math.max(0.05, scale * 0.75));

  requestAnimationFrame(frame);
}

requestAnimationFrame(frame);
</script>
</body>
</html>
